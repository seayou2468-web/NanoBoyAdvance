name: iOS Device .ipa (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-ios-device-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Configure CMake (Xcode, iOS device only)
        run: |
          cmake -S . -B build-ios-device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_XCODE_ATTRIBUTE_SUPPORTED_PLATFORMS=iphoneos \
            -DCMAKE_XCODE_ATTRIBUTE_TARGETED_DEVICE_FAMILY=1,2 \
            -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO

      - name: Build .app for iOS real device (no signing)
        run: |
          cmake --build build-ios-device --config Release --target AuroraIOS -- \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package unsigned .ipa
        run: |
          APP_PATH="build-ios-device/Release-iphoneos/AuroraIOS.app"
          IPA_PATH="build-ios-device/AuroraIOS-unsigned.ipa"
          rm -rf build-ios-device/Payload "$IPA_PATH"
          mkdir -p build-ios-device/Payload
          cp -R "$APP_PATH" build-ios-device/Payload/
          (
            cd build-ios-device
            /usr/bin/zip -qry "$(basename "$IPA_PATH")" Payload
          )

      - name: Upload unsigned .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraIOS-unsigned-ipa
          path: build-ios-device/AuroraIOS-unsigned.ipa
          if-no-files-found: error
