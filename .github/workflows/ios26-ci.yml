name: iOS 26 CI

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  mikage-ios26-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Verify Xcode / iOS SDK
        run: |
          set -euxo pipefail
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iPhoneOS SDK: ${SDK_VERSION}"
          case "${SDK_VERSION}" in
            26.*) ;;
            *)
              echo "Expected iOS 26.x SDK but found ${SDK_VERSION}" >&2
              exit 1
              ;;
          esac

      - name: Full build Mikage core (iOS device)
        run: |
          set -euxo pipefail
          ./scripts/ci/build_mikage_full_ios_device.sh

      - name: Verify full build artifact
        run: |
          set -euxo pipefail
          ls -lh build/mikage-ios26-device/libmikage_full.a

  auroraios-unsigned-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Build unsigned .app (iOS Simulator)
        shell: bash
        run: |
          set -euxo pipefail

          WORKSPACE=""
          PROJECT=""
          if compgen -G "*.xcworkspace" >/dev/null; then
            WORKSPACE="$(ls -1 *.xcworkspace | head -n1)"
          elif compgen -G "*.xcodeproj" >/dev/null; then
            PROJECT="$(ls -1 *.xcodeproj | head -n1)"
          elif compgen -G "ios/*.xcworkspace" >/dev/null; then
            WORKSPACE="$(ls -1 ios/*.xcworkspace | head -n1)"
          elif compgen -G "ios/*.xcodeproj" >/dev/null; then
            PROJECT="$(ls -1 ios/*.xcodeproj | head -n1)"
          else
            echo "No .xcworkspace or .xcodeproj found for app build" >&2
            exit 1
          fi

          if [[ -n "${WORKSPACE}" ]]; then
            SCHEME="$(xcodebuild -workspace "${WORKSPACE}" -list -json | /usr/bin/python3 -c 'import json,sys; d=json.load(sys.stdin); print((d.get("workspace",{}).get("schemes") or [""])[0])')"
            [[ -n "${SCHEME}" ]] || { echo "No shared scheme found in workspace ${WORKSPACE}" >&2; exit 1; }
            xcodebuild \
              -workspace "${WORKSPACE}" \
              -scheme "${SCHEME}" \
              -configuration Release \
              -destination 'generic/platform=iOS Simulator' \
              -derivedDataPath build/deriveddata-ios26-app \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          else
            SCHEME="$(xcodebuild -project "${PROJECT}" -list -json | /usr/bin/python3 -c 'import json,sys; d=json.load(sys.stdin); print((d.get("project",{}).get("schemes") or [""])[0])')"
            [[ -n "${SCHEME}" ]] || { echo "No shared scheme found in project ${PROJECT}" >&2; exit 1; }
            xcodebuild \
              -project "${PROJECT}" \
              -scheme "${SCHEME}" \
              -configuration Release \
              -destination 'generic/platform=iOS Simulator' \
              -derivedDataPath build/deriveddata-ios26-app \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          fi

          APP_PATH="$(find build/deriveddata-ios26-app/Build/Products -type d -name '*.app' | head -n1)"
          [[ -n "${APP_PATH}" ]] || { echo "Unsigned .app was not produced" >&2; exit 1; }

          mkdir -p build/ios-app
          rm -rf build/ios-app/AuroraIOS.app
          cp -R "${APP_PATH}" build/ios-app/AuroraIOS.app

      - name: Upload unsigned .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: auroraios-unsigned-app
          path: build/ios-app/AuroraIOS.app
          if-no-files-found: error
