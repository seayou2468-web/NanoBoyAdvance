name: iOS 26 CI

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  mikage-ios26-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Verify Xcode / iOS SDK
        run: |
          set -euxo pipefail
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk iphonesimulator --show-sdk-version)"
          echo "iPhoneSimulator SDK: ${SDK_VERSION}"
          case "${SDK_VERSION}" in
            26.*) ;;
            *)
              echo "Expected iOS 26.x SDK but found ${SDK_VERSION}" >&2
              exit 1
              ;;
          esac

      - name: Build Mikage core adapter (iOS simulator)
        run: |
          set -euxo pipefail
          xcrun --sdk iphonesimulator clang++ \
            -std=c++20 \
            -D__APPLE__=1 \
            -DTARGET_OS_IPHONE=1 \
            -I. -Isrc -Isrc/core -Isrc/core/mikage \
            -fsyntax-only \
            src/core/mikage/core_adapter.cpp

      - name: Link smoke test for C API + registry (iOS simulator)
        run: |
          set -euxo pipefail
          cat > /tmp/mikage_ci_dummy.cpp <<'CPP'
          #include "src/core/api/emulator_core_c_api.h"
          int main() {
            EmulatorCoreHandle* core = EmulatorCore_Create(EMULATOR_CORE_TYPE_3DS);
            EmulatorCore_Destroy(core);
            return 0;
          }
          CPP

          xcrun --sdk iphonesimulator clang++ \
            -std=c++20 \
            -D__APPLE__=1 \
            -DTARGET_OS_IPHONE=1 \
            -I. -Isrc -Isrc/core -Isrc/core/mikage \
            /tmp/mikage_ci_dummy.cpp \
            src/core/api/emulator_core_c_api.cpp \
            src/core/core_adapter_registry.cpp \
            -o /tmp/mikage_ci_smoke
